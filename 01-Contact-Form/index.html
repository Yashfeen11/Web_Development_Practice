<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <form>

            <h2 >Contact Us:</h2>
            <label for="fullname" class="label">Enter your Name:</label>
            <input type="text" id="fullname" placeholder="Enter your name" name="Fname" required/>
            <label for="email" class="label">Enter your Email:</label>
            <input type="email" required id="email" placeholder="e.g xy@gmail.com" name="email"/>
            <label for="para" class="label">Enter your Message:</label>
            <textarea row="5" placeholder="Type..."cols="20" id="para" name="para"></textarea>
            <div><button type="submit" id="submit">Submit</button>
            </div>
        </form>
    </div>
    
</body>
</html>
